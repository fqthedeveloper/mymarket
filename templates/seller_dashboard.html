{% extends "base.html" %}

{% block content %}

<style>

.grid{
column-count:4;
column-gap:20px;
padding:25px;
}

.card{
break-inside:avoid;
margin-bottom:20px;
background:#111;
border-radius:12px;
overflow:hidden;
position:relative;
box-shadow:0 0 15px rgba(255,215,0,0.2);
}

.card img{
width:100%;
display:block;
}

.dots{
position:absolute;
top:10px;
right:10px;
font-size:20px;
cursor:pointer;
background:black;
padding:6px 10px;
border-radius:6px;
}

.menu{
display:none;
position:absolute;
top:45px;
right:10px;
background:black;
border:1px solid gold;
border-radius:8px;
width:160px;
z-index:999;
}

.menu a{
display:block;
padding:12px;
color:gold;
text-decoration:none;
}

.menu a:hover{
background:rgba(255,215,0,0.1);
}

@media(max-width:1000px){
.grid{column-count:3;}
}

@media(max-width:768px){
.grid{column-count:2;}
}

@media(max-width:480px){
.grid{column-count:1;}
}

</style>


<h2 style="padding:20px;color:gold;">Seller Dashboard</h2>

<div style="padding:0 20px 20px;">
<a href="/upload/" class="btn">Add Product</a>
</div>


<div class="grid">

{% for product in products %}

<div class="card">

<img src="{{ product.image.url }}">

<div class="dots" onclick="toggleMenu({{ product.id }})">⋮</div>

<div class="menu" id="menu-{{ product.id }}">

<a href="/edit/{{ product.id }}/">Edit Product</a>

<a href="/delete/{{ product.id }}/">Delete Product</a>

</div>

</div>

{% endfor %}

</div>


<script>

function toggleMenu(id){

let menu=document.getElementById("menu-"+id)

document.querySelectorAll(".menu").forEach(function(m){
if(m!==menu){
m.style.display="none"
}
})

if(menu.style.display==="block"){
menu.style.display="none"
}else{
menu.style.display="block"
}

}

document.addEventListener("click",function(){
document.querySelectorAll(".menu").forEach(function(menu){
menu.style.display="none"
})
})

</script>

{% endblock %}

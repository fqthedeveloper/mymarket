{% extends "base.html" %}

{% block title %}
{{ page_title }} - Exotic Marketplace
{% endblock %}

{% block content %}

<style>

*{
box-sizing:border-box;
}

/* GRID LAYOUT */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:18px;
padding:18px;
max-width:1400px;
margin:auto;
}


/* CARD */

.card{
position:relative;
background:#1a1a1a;
border-radius:12px;
overflow:hidden;
transition:0.3s;
display:flex;
flex-direction:column;
height:100%;
}


/* IMAGE */

.card img{
width:100%;
height:200px;
object-fit:cover;
cursor:pointer;
transition:0.3s;
}

.card:hover img{
transform:scale(1.05);
}


/* TITLE */

.card h3{
font-size:16px;
text-align:center;
padding:10px 8px;
color:white;
word-break:break-word;
flex-grow:1;
}


/* ACTION BAR */

.action-bar{
position:absolute;
bottom:0;
left:0;
right:0;
background:rgba(0,0,0,0.9);
display:flex;
justify-content:space-around;
align-items:center;
padding:8px;
opacity:0;
transform:translateY(100%);
transition:0.25s ease;
}


/* DESKTOP HOVER */

.card:hover .action-bar{
opacity:1;
transform:translateY(0);
}


/* BUTTON */

.icon-btn{
background:none;
border:none;
color:white;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
}

.icon-btn:hover{
color:#00e1ff;
}


/* MOBILE TOUCH SUPPORT */

@media (hover:none){

.card .action-bar{
opacity:1;
transform:translateY(0);
}

}


/* SMALL MOBILE */

@media (max-width:480px){

.grid{
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:12px;
}

.card img{
height:160px;
}

.card h3{
font-size:14px;
}

}


/* LARGE MOBILE */

@media (min-width:481px) and (max-width:768px){

.grid{
grid-template-columns:repeat(3,1fr);
}

.card img{
height:180px;
}

}


/* TABLET */

@media (min-width:769px) and (max-width:1100px){

.grid{
grid-template-columns:repeat(4,1fr);
}

}


/* DESKTOP */

@media (min-width:1101px){

.grid{
grid-template-columns:repeat(5,1fr);
}

}

</style>


<div class="grid">

{% for product in products %}

<div class="card {% if product.has_messages %}chat-active{% endif %}">

<a href="{% url 'product_detail' product.id %}" style="text-decoration:none;color:inherit;">

<img src="{{ product.image.url }}">

<h3>{{ product.title }}</h3>

</a>


<div class="action-bar">

<button class="icon-btn"
onclick="event.stopPropagation(); window.location.href='{% url 'seller_profile' product.seller.username %}'">
<i data-lucide="contact"></i>
</button>


<button class="icon-btn"
onclick="event.stopPropagation(); window.location.href='{% url 'toggle_save' product.id %}'">

{% if product.is_saved %}
<i data-lucide="bookmark-check"></i>
{% else %}
<i data-lucide="bookmark"></i>
{% endif %}

</button>


<button class="icon-btn"
onclick="event.stopPropagation(); window.location.href='{% url 'wishlist_toggle' product.id %}'">

{% if product.is_saved %}
<i data-lucide="heart" style="color:red;fill:red;"></i>
{% else %}
<i data-lucide="heart"></i>
{% endif %}

</button>


<button class="icon-btn"
onclick="event.stopPropagation(); window.location.href='{% url 'start_chat' product.id %}'">
<i data-lucide="message-circle"></i>
</button>


<button class="icon-btn"
onclick="event.stopPropagation(); shareProduct({{ product.id }})">
<i data-lucide="send"></i>
</button>

</div>

</div>

{% endfor %}

</div>


<script>

function shareProduct(id){

const link = window.location.origin + "/product/" + id + "/";

navigator.clipboard.writeText(link);

alert("Product link copied");

}

</script>

{% endblock %}

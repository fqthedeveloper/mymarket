{% extends "base.html" %}

{% block content %}

<div style="width:400px;margin:80px auto;background:#111;padding:30px;border-radius:10px;">

<h2 style="color:gold;text-align:center;">Upload Product</h2>

<form method="post" enctype="multipart/form-data">

{% csrf_token %}

<input type="text" name="title" placeholder="Product title" required style="width:100%;padding:10px;margin-top:10px">

<textarea name="description" placeholder="Description" required style="width:100%;padding:10px;margin-top:10px"></textarea>

<input type="file" name="image" required style="margin-top:10px">

<input type="text" name="price_reply" placeholder="Auto reply for price" style="width:100%;padding:10px;margin-top:10px">

<input type="text" name="size_reply" placeholder="Auto reply for size" style="width:100%;padding:10px;margin-top:10px">

<textarea name="details_reply" placeholder="Auto reply for details" style="width:100%;padding:10px;margin-top:10px"></textarea>

<button style="margin-top:15px;background:gold;padding:10px;border:none;width:100%">
Upload
</button>

</form>

</div>

{% endblock %}

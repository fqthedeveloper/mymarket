<!DOCTYPE html>
<html>
<head>
    <title>Seller Inbox</title>
</head>
<body>

<h2>Seller Inbox</h2>

{% for msg in messages %}
<div style="border:1px solid #ccc; padding:15px; margin:15px;">
    <p><strong>Product:</strong> {{ msg.product.title }}</p>
    <p><strong>From:</strong> {{ msg.sender.username }}</p>
    <p><strong>Message:</strong> {{ msg.text }}</p>

    <form method="POST" action="/reply/{{ msg.id }}/">
        {% csrf_token %}
        <input type="text" name="reply" placeholder="Reply..." required>
        <button type="submit">Send Reply</button>
    </form>
</div>
{% empty %}
<p>No messages yet.</p>
{% endfor %}

</body>
</html>

{% extends "base.html" %}

{% block title %}
Reset Password
{% endblock %}

{% block content %}

<style>

.reset-wrapper{
display:flex;
justify-content:center;
align-items:center;
padding:40px 20px;
}

.reset-card{
width:100%;
max-width:420px;
background:#111;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.6);
}

.reset-title{
text-align:center;
color:gold;
margin-bottom:20px;
}

.reset-input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid gold;
background:black;
color:white;
border-radius:6px;
font-size:15px;
}

.reset-btn{
width:100%;
padding:12px;
background:gold;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.reset-btn:hover{
background:#ffd700;
}

.reset-links{
text-align:center;
margin-top:15px;
}

.reset-links a{
color:gold;
text-decoration:none;
}

@media (max-width:480px){

.reset-card{
padding:20px;
}

}

</style>

<div class="reset-wrapper">

<div class="reset-card">

<h2 class="reset-title">Reset Password</h2>

<form method="post">

{% csrf_token %}

<input
type="email"
name="email"
placeholder="Enter your registered email"
required
class="reset-input"
>

<button class="reset-btn">
Send Reset Link
</button>

</form>

<div class="reset-links">
<a href="{% url 'login' %}">Back to Login</a>
</div>

</div>

</div>

{% endblock %}

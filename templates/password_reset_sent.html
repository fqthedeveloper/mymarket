{% extends "base.html" %}

{% block title %}
Reset Email Sent
{% endblock %}

{% block content %}

<style>

.sent-wrapper{
display:flex;
justify-content:center;
align-items:center;
padding:50px 20px;
}

.sent-card{
width:100%;
max-width:420px;
background:#111;
padding:35px;
border-radius:10px;
text-align:center;
}

.sent-card h2{
color:gold;
margin-bottom:15px;
}

.sent-card p{
color:#ddd;
line-height:1.6;
}

.sent-card a{
display:inline-block;
margin-top:20px;
color:gold;
text-decoration:none;
}

</style>

<div class="sent-wrapper">

<div class="sent-card">

<h2>Email Sent</h2>

<p>
If an account exists with the email you entered,
you will receive a password reset link shortly.
</p>

<a href="{% url 'login' %}">Return to Login</a>

</div>

</div>

{% endblock %}

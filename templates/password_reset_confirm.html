{% extends "base.html" %}

{% block title %}
Create New Password
{% endblock %}

{% block content %}

<style>

.confirm-wrapper{
display:flex;
justify-content:center;
align-items:center;
padding:40px 20px;
}

.confirm-card{
width:100%;
max-width:420px;
background:#111;
padding:30px;
border-radius:10px;
}

.confirm-title{
text-align:center;
color:gold;
margin-bottom:20px;
}

.confirm-card input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid gold;
background:black;
color:white;
border-radius:6px;
}

.confirm-btn{
width:100%;
padding:12px;
background:gold;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.confirm-btn:hover{
background:#ffd700;
}

</style>

<div class="confirm-wrapper">

<div class="confirm-card">

<h2 class="confirm-title">Create New Password</h2>

<form method="post">

{% csrf_token %}

{{ form.as_p }}

<button class="confirm-btn">
Change Password
</button>

</form>

</div>

</div>

{% endblock %}

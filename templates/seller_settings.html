<!DOCTYPE html>
<html>
<head>
    <title>Exotic - Seller Settings</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: black;
            color: white;
        }

        header {
            padding: 20px 30px;
            border-bottom: 1px solid gold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: 28px;
            color: gold;
        }

        .btn {
            text-decoration: none;
            background: gold;
            color: black;
            padding: 8px 15px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .container {
            max-width: 600px;
            margin: 50px auto;
            background: #111;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(255,215,0,0.2);
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 6px;
            border: none;
        }

        label {
            color: gold;
            font-size: 14px;
        }

        .qr-preview {
            margin-top: 10px;
            max-width: 150px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">Exotic - Seller Settings</div>
    <a href="/seller/" class="btn">Back to Dashboard</a>
</header>

<div class="container">

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <label>Shop Name</label>
        <input type="text" name="shop_name" value="{{ profile.shop_name|default:'' }}">

        <label>Shop Address</label>
        <textarea name="shop_address">{{ profile.shop_address|default:'' }}</textarea>

        <label>Upload QR Code</label>
        <input type="file" name="qr_code">

        {% if profile.qr_code %}
            <div>
                <p style="color:gold;">Current QR Code:</p>
                <img src="{{ profile.qr_code.url }}" class="qr-preview">
            </div>
        {% endif %}

        <button type="submit" class="btn">Save Changes</button>

    </form>

</div>

</body>
</html>

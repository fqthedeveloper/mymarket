{% extends "base.html" %}

{% block title %}
Upload Product - Exotic Marketplace
{% endblock %}

{% block content %}

<style>

.upload-container{
max-width:500px;
margin:60px auto;
background:#111;
padding:30px;
border-radius:12px;
border:1px solid #222;
}

.upload-container h2{
text-align:center;
color:gold;
margin-bottom:20px;
}

.upload-container input,
.upload-container textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #333;
background:#000;
color:white;
}

.upload-container input:focus,
.upload-container textarea:focus{
outline:none;
border-color:gold;
}

.upload-container button{
margin-top:20px;
width:100%;
padding:12px;
background:gold;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.upload-container button:hover{
background:#e6c200;
}

</style>

<div class="upload-container">

<h2>Upload Product</h2>

<form method="post" enctype="multipart/form-data">

{% csrf_token %}

<input type="text" name="title" placeholder="Product Title" required>

<textarea name="description" placeholder="Product Description" required></textarea>

<input type="file" name="image" required>

<input type="number" step="0.01" name="price" placeholder="Product Price ₹" required>

<input type="number" name="stock" placeholder="Stock Quantity" required>

<input type="text" name="price_reply" placeholder="Auto reply for price (chat)">

<input type="text" name="size_reply" placeholder="Auto reply for size">

<textarea name="details_reply" placeholder="Auto reply for details"></textarea>

<button type="submit">
Upload Product
</button>

</form>

</div>

{% endblock %}

{% extends "base.html" %}
{% block title %}
Register - Exotic Marketplace
{% endblock %}
{% block content %}

<div id="register-container"
style="width:350px;margin:80px auto;background:#111;padding:30px;border-radius:10px;">
</div>

<script>

let container = document.getElementById("register-container");

{% if success %}

let seconds = 5;

container.innerHTML = `

<h2 style="color:lime;text-align:center;">
Account Created Successfully
</h2>

<p style="color:white;text-align:center;margin-top:20px;">
Verification email has been sent to your email address.
</p>

<p style="color:gold;text-align:center;margin-top:10px;">
Redirecting to login page in <span id="countdown">5</span> seconds...
</p>

<div style="text-align:center;margin-top:20px;">
<a href="/login/" style="color:gold;">Go to Login</a>
</div>

`;

let countdown = document.getElementById("countdown");

let timer = setInterval(function(){

    seconds--;

    countdown.innerText = seconds;

    if(seconds <= 0){

        clearInterval(timer);

        window.location.href = "/login/";

    }

},1000);

{% else %}

container.innerHTML = `

<h2 style="text-align:center;color:gold;margin-bottom:20px;">
Create Account
</h2>

<form method="post" style="display:flex;flex-direction:column;gap:12px;">

{% csrf_token %}

<input type="text"
name="first_name"
placeholder="First Name"
required
style="padding:10px;border-radius:6px;border:1px solid gold;background:black;color:white;">

<input type="text"
name="last_name"
placeholder="Last Name"
required
style="padding:10px;border-radius:6px;border:1px solid gold;background:black;color:white;">

<input type="text"
name="username"
placeholder="Username"
required
style="padding:10px;border-radius:6px;border:1px solid gold;background:black;color:white;">

<input type="email"
name="email"
placeholder="Email"
required
style="padding:10px;border-radius:6px;border:1px solid gold;background:black;color:white;">

<input type="password"
name="password"
placeholder="Password"
required
style="padding:10px;border-radius:6px;border:1px solid gold;background:black;color:white;">

<input type="password"
name="confirm_password"
placeholder="Confirm Password"
required
style="padding:10px;border-radius:6px;border:1px solid gold;background:black;color:white;">

<button type="submit"
style="background:gold;color:black;padding:10px;border:none;border-radius:6px;font-weight:bold;cursor:pointer;">
Register
</button>

<div style="text-align:center;margin-top:10px;">
Already have account?
<a href="/login/" style="color:gold;text-decoration:none;">Login</a>
</div>

</form>

`;

{% endif %}

</script>

{% endblock %}
